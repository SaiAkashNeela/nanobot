x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - nanobot_data:/home/nanobot/.nanobot
  environment:
    # --- CORE ---
    - NANOBOT_CHANNELS__WEBSOCKET__ENABLED=true
    - NANOBOT_GATEWAY__HOST=0.0.0.0
    - NANOBOT_API__HOST=0.0.0.0
    - NANOBOT_AGENTS__DEFAULTS__TIMEZONE=UTC  # e.g., Asia/Kolkata, America/New_York

    # --- AGENT DEFAULTS ---
    - NANOBOT_AGENTS__DEFAULTS__PROVIDER=gemini
    - NANOBOT_AGENTS__DEFAULTS__MODEL=gemini-1.5-pro

    # --- LLM PROVIDERS ---
    - NANOBOT_PROVIDERS__GEMINI__API_KEY=YOUR_GEMINI_API_KEY_HERE
    - NANOBOT_PROVIDERS__OPENAI__API_KEY=
    - NANOBOT_PROVIDERS__ANTHROPIC__API_KEY=
    - NANOBOT_PROVIDERS__DEEPSEEK__API_KEY=
    - NANOBOT_PROVIDERS__OPENROUTER__API_KEY=
    - NANOBOT_PROVIDERS__GROQ__API_KEY=

    # --- TELEGRAM ---
    - NANOBOT_CHANNELS__TELEGRAM__ENABLED=true
    - NANOBOT_CHANNELS__TELEGRAM__TOKEN=YOUR_TELEGRAM_BOT_TOKEN_HERE
    - NANOBOT_CHANNELS__TELEGRAM__ALLOW_FROM=["YOUR_TELEGRAM_USER_ID_HERE"]

    # --- WEB SEARCH (Optional) ---
    # Provider options: tavily, brave, duckduckgo, jina, kagi, olostep
    - NANOBOT_TOOLS__WEB__SEARCH__PROVIDER=duckduckgo
    - NANOBOT_TOOLS__WEB__SEARCH__API_KEY=
    - NANOBOT_TOOLS__RESTRICT_TO_WORKSPACE=false
    # --- SIDECAR DATABASES ---
    - POSTGRES_URL=postgresql://nanobot:nanobot_password@postgres:5432/nanobot
    - REDIS_URL=redis://redis:6379/0
    - MONGO_URL=${MONGO_URL:-mongodb://nanobot:nanobot_password@mongodb:27017/nanobot?authSource=admin}
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined
  networks:
    - nanobot-net

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-api:
    container_name: nanobot-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nanobot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nanobot
      - POSTGRES_PASSWORD=nanobot_password
      - POSTGRES_DB=nanobot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nanobot-net

  redis:
    image: redis:7-alpine
    container_name: nanobot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - nanobot-net

  mongodb:
    image: mongo:latest
    container_name: nanobot-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=nanobot
      - MONGO_INITDB_ROOT_PASSWORD=nanobot_password
    volumes:
      - mongo_data:/data/db
    networks:
      - nanobot-net

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
    networks:
      - nanobot-net

networks:
  nanobot-net:
    driver: bridge

volumes:
  nanobot_data:
  postgres_data:
  redis_data:
  mongo_data:
